name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Move into project folder
        run: cd Domins

      - name: Make gradlew executable
        run: chmod +x Domins/gradlew || true

      - name: Build APK
        run: |
          cd Domins
          if [ -f ./gradlew ]; then
            ./gradlew clean assembleDebug
          else
            echo "gradlew not found in Domins"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-apk
          path: Domins/app/build/outputs/apk/debug/app-debug.apk