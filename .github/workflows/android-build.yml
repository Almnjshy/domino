name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show project structure
        run: ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Detect project path
        id: detect
        run: |
          if [ -f "./gradlew" ]; then
            echo "path=." >> $GITHUB_OUTPUT
          elif [ -f "./Domins/gradlew" ]; then
            echo "path=./Domins" >> $GITHUB_OUTPUT
          else
            echo "No Android project found"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x ${{ steps.detect.outputs.path }}/gradlew

      - name: Build APK
        run: |
          cd ${{ steps.detect.outputs.path }}
          ./gradlew clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: domino-apk
          path: ${{ steps.detect.outputs.path }}/app/build/outputs/apk/debug/app-debug.apk